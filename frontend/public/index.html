<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Primary SEO -->
    <title>SVSU Events Hub | College Events, Workshops & Hackathons</title>
    <meta name="description" content="SVSU Events Hub is the official platform for college events, workshops, hackathons, tech fests, and student activities at Shri Vishwakarma Skill University. Register online and stay updated with campus events." />
    <meta name="keywords" content="SVSU Events, SVSU Events Hub, Shri Vishwakarma Skill University events, college events, workshops, hackathons, tech fest, campus events, university event registration, student activities, Gurugram university events" />
    <meta name="author" content="SVSU Events Hub" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Google Bot -->
    <meta name="googlebot" content="index, follow" />

    <!-- ✅ Canonical -->
    <link rel="canonical" href="https://svsuevents.in/" />

    <!-- ✅ Open Graph (Facebook / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://svsuevents.in/" />
    <meta property="og:title" content="SVSU Events Hub | College Events, Workshops & Hackathons" />
    <meta property="og:description" content="Explore workshops, hackathons, tech fests, and campus events at Shri Vishwakarma Skill University. Register online!" />
    <meta property="og:image" content="https://svsuevents.in/svsu_logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SVSU Events Hub" />
    <meta property="og:locale" content="en_IN" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SVSU Events Hub | College Events, Workshops & Hackathons" />
    <meta name="twitter:description" content="Join workshops, hackathons, and university events at Shri Vishwakarma Skill University." />
    <meta name="twitter:image" content="https://svsuevents.in/svsu_logo.png" />

    <!-- ✅ Favicon — updated as per your public/ folder -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ✅ Theme Color -->
    <meta name="theme-color" content="#001BB7" />

    <!-- ✅ Structured Data — CollegeOrUniversity -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollegeOrUniversity",
      "name": "SVSU Events Hub",
      "url": "https://svsuevents.in",
      "logo": "https://svsuevents.in/favicon-512x512.png",
      "description": "Official event portal of Shri Vishwakarma Skill University for workshops, hackathons, tech fests and campus activities.",
      "parentOrganization": {
        "@type": "CollegeOrUniversity",
        "name": "Shri Vishwakarma Skill University",
        "url": "https://svsu.ac.in"
      },
      "sameAs": [
        "https://svsu.ac.in"
      ]
    }
    </script>

    <!-- ✅ Structured Data — WebSite (Google Search Box enable) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SVSU Events Hub",
      "url": "https://svsuevents.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://svsuevents.in/student?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
